<script>
	document.addEventListener('DOMContentLoaded', () => {
		
		// Smooth scroll + close mobile menu
		function navigation() {
			const body = document.body;
			const header = document.querySelector('header');
			const mobileIcon = header.querySelector('.hamburger-menu');
			const mobileMenu = header.querySelector('.navigation-main__primary');
			const overlay = document.querySelector('.overlay-menu');
			
			function closeMenu() {
				mobileMenu.classList.remove('active');
				header.classList.remove('active');
				body.classList.remove('active');
			}
			
			function toggleMenu() {
				mobileMenu.classList.toggle('active');
				header.classList.toggle('active');
				body.classList.toggle('active');
			}
			
			document.querySelectorAll('a[href^="#"]').forEach(anchor => {
				anchor.addEventListener('click', function (e) {
					const target = document.querySelector(this.getAttribute('href'));
					
					if (!target) return;
					
					e.preventDefault();
					
					target.scrollIntoView({
						behavior: 'smooth'
					});
					
					closeMenu();
				});
			});
			
			// Mobile icon
			mobileIcon.addEventListener('click', toggleMenu);
			
			// Overlay
			overlay.addEventListener('click', closeMenu);
		}
		
		navigation();
		
		// Active links
		function activeLink() {
			const links = document.querySelectorAll(".navigation-main__primary .nav_link");
			
			const currentPath = window.location.pathname;
			
			links.forEach(link => {
				const href = link.getAttribute("href");
				
				if (!href) return;
				
				// hash links → ignore active state (or handle separately if needed)
				if (href.startsWith("#")) return;
				
				const linkPath = new URL(link.href, window.location.origin).pathname;
				
				link.classList.toggle("active", linkPath === currentPath);
			});
		}
		
		activeLink();
		
		// Carousel
		function Carousel() {
			const track = document.getElementById('carousel-track');
			
			if (!track) return;
			
			const outer = track.parentElement;
			const cards = [...track.querySelectorAll('.review-card')];
			
			let current = 0;
			let isDragging = false;
			let startX = 0;
			
			function getVisible() {
				if (window.innerWidth <= 768) return 1;
				if (window.innerWidth <= 1024) return 2;
				return 3;
			}
			
			function getGap() {
				if (window.innerWidth <= 768) return 12;
				if (window.innerWidth <= 1024) return 16;
				return 20;
			}
			
			function getStep() {
				const cardWidth = cards[0].getBoundingClientRect().width;
				return cardWidth + getGap();
			}
			
			function getMax() {
				return Math.max(0, cards.length - getVisible());
			}
			
			function updateCarousel(animate = true) {
				track.style.transition = animate
						? "transform .4s cubic-bezier(.4,0,.2,1)"
						: "none";
				
				const step = getStep();
				track.style.transform = `translateX(-${current * step}px)`;
			}
			
			function next() {
				if (current < getMax()) {
					current++;
					updateCarousel();
				}
			}
			
			function prev() {
				if (current > 0) {
					current--;
					updateCarousel();
				}
			}
			
			// swipe
			function startDrag(e) {
				isDragging = true;
				startX = e.touches ? e.touches[0].clientX : e.clientX;
			}
			
			function onDrag(e) {
				if (!isDragging) return;
				
				const x = e.touches ? e.touches[0].clientX : e.clientX;
				const diff = startX - x;
				
				if (Math.abs(diff) > 50) {
					diff > 0 ? next() : prev();
					isDragging = false;
				}
			}
			
			function endDrag() {
				isDragging = false;
			}
			
			// events
			document.getElementById('next-btn').addEventListener('click', next);
			document.getElementById('prev-btn').addEventListener('click', prev);
			
			outer.addEventListener('mousedown', startDrag);
			outer.addEventListener('touchstart', startDrag);
			
			window.addEventListener('mousemove', onDrag);
			window.addEventListener('touchmove', onDrag);
			
			window.addEventListener('mouseup', endDrag);
			window.addEventListener('touchend', endDrag);
			
			// resize fix
			window.addEventListener('resize', () => {
				const max = getMax();
				if (current > max) current = max;
				updateCarousel(false);
			});
			
			// init
			updateCarousel(false);
		}
		
		Carousel();
		
		// FAQ
		function Faq() {
			document.querySelectorAll('.faq-item').forEach(item => {
				const q = item.querySelector('.faq-question');
				const a = item.querySelector('.faq-answer');
				
				a.style.height = '0px';
				
				q.addEventListener('click', () => {
					const open = item.classList.contains('open');
					
					document.querySelectorAll('.faq-item.open').forEach(i => {
						closeItem(i);
					});
					
					if (!open) openItem(item);
				});
				
				q.addEventListener('keydown', e => {
					if (e.key === 'Enter' || e.key === ' ') q.click();
				});
			});
			
			function openItem(item) {
				const a = item.querySelector('.faq-answer');
				item.classList.add('open');
				
				a.style.height = a.scrollHeight + 'px';
				
				a.addEventListener('transitionend', function handler() {
					a.style.height = 'auto';
					a.removeEventListener('transitionend', handler);
				});
			}
			
			function closeItem(item) {
				const a = item.querySelector('.faq-answer');
				
				a.style.height = a.scrollHeight + 'px';
				
				requestAnimationFrame(() => {
					a.style.height = '0px';
				});
				
				item.classList.remove('open');
			}
		}
		
		Faq();
		
		// Scroll fade-in
		function Scroll() {
			const observer = new IntersectionObserver(entries => {
				entries.forEach(e => {
					if (e.isIntersecting) {
						e.target.classList.add('visible');
						observer.unobserve(e.target);
					}
				});
			}, {threshold: 0.12});
			document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));
		}
		
		Scroll();
	});
</script>
