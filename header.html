<script>
	document.addEventListener('DOMContentLoaded', () => {
		// Smooth scroll
		function smoothScrollPrimary() {
			document.querySelectorAll('a[href^="#"]').forEach(anchor => {
				anchor.addEventListener('click', function (e) {
					e.preventDefault();
					
					document.querySelector(this.getAttribute('href')).scrollIntoView({
						behavior: 'smooth'
					});
				});
			});
		}
		
		smoothScrollPrimary()
		
		// Active inks
		function activeLink() {
			const links = document.querySelectorAll(".navigation-main__primary .nav_link");
			
			const currentPath = window.location.pathname;
			
			links.forEach(link => {
				const href = link.getAttribute("href");
				
				if (!href) return;
				
				// hash links → ignore active state (or handle separately if needed)
				if (href.startsWith("#")) return;
				
				const linkPath = new URL(link.href, window.location.origin).pathname;
				
				link.classList.toggle("active", linkPath === currentPath);
			});
		}
		
		activeLink();
		
		activeLink();
		
		// Mobile menu
		function mobileMenu() {
			const header = document.querySelector('header');
			const body = document.getElementsByTagName("body")[0];
			const mobileIcon = header.querySelector('.hamburger-menu');
			const mobileMenu = header.querySelector('.navigation-main__primary');
			const overlay = document.querySelector('.overlay-menu');
			const menuLinks = document.querySelectorAll(".menu a[href^='#']");
			
			menuLinks.forEach(menuLink => {
				menuLink.addEventListener('click', function (element) {
					element.preventDefault();
					mobileMenu.classList.toggle('active');
					header.classList.toggle('active');
				});
			});
			
			mobileIcon.addEventListener('click', function () {
				mobileMenu.classList.toggle('active');
				header.classList.toggle('active');
				body.classList.toggle('active');
			});
			
			overlay.addEventListener('click', function () {
				mobileMenu.classList.remove('active');
				header.classList.remove('active');
				body.classList.remove('active');
			});
		}
		
		mobileMenu();
	});
</script>
