<style>
	:root {
		--white: #ffffff;
		--black: #000000;
		--light-violet: #7965C1;
		--light-violet-2: #EEEBF9;
		--mid-violet: #44369D;
		--dark-violet: #1B073A;
		--yellow: #F6ED50;
		--main-bg: #FBFAFF;
		--radius-sm: 20px;
		--radius-md: 30px;
		--radius-full: 100px;
		--page-width: 1320px;
		--shadow-block: 0 4px 10px #7965c14d;
		--shadow-block-2: 0 -5px 10px rgba(121, 101, 193, 0.5);
		
		--font-sans: 'FunnelSans', sans-serif;
		--font-display: 'FunnelDisplay', sans-serif;
		
		--font-regular: 400;
		--font-bold: 600;
	}
	
	@font-face {
		font-family: 'FunnelSans';
		src: url('https://uni-luma.com/wp-content/uploads/2026/04/Custom-FunnelSans-Regular.ttf') format('truetype');
		font-weight: 400;
		font-style: normal;
		font-display: swap;
	}
	
	@font-face {
		font-family: 'FunnelSans';
		src: url('https://uni-luma.com/wp-content/uploads/2026/04/Custom-FunnelSans-SemiBold.ttf') format('truetype');
		font-weight: 600;
		font-style: normal;
		font-display: swap;
	}
	
	@font-face {
		font-family: 'FunnelDisplay';
		src: url('https://uni-luma.com/wp-content/uploads/2026/04/Custom-FunnelDisplay-Regular.ttf') format('truetype');
		font-weight: 400;
		font-style: normal;
		font-display: swap;
	}
	
	@font-face {
		font-family: 'FunnelDisplay';
		src: url('https://uni-luma.com/wp-content/uploads/2026/04/Custom-FunnelDisplay-SemiBold.ttf') format('truetype');
		font-weight: 600;
		font-style: normal;
		font-display: swap;
	}
	
	html {
		scroll-behavior: smooth;
		min-height: 100%;
	}
	
	body {
		font-family: var(--font-sans);
		display: flex;
		flex-direction: column;
		height: 100%;
		background-color: var(--main-bg);
		overflow-x: hidden;
		
		&.active {
			overflow: hidden;
		}
	}
	
	main {
		input:not([type="radio"]):not([type="checkbox"]),
		select,
		textarea {
			display: block !important;
			font-size: 18px !important;
			line-height: 1 !important;
			padding: 15px 20px !important;
			color: var(--mid-violet);
			border: 1px solid var(--light-violet) !important;
			box-shadow: var(--shadow-block);
			margin-right: 0 !important;
			
			&:hover, &:focus, &:active {
				outline: var(--mid-violet) !important;
			}
		}
		
		input:not([type="radio"]):not([type="checkbox"]),
		select {
			height: auto !important;
			border-radius: var(--radius-full) !important;
		}
		
		textarea {
			border-radius: var(--radius-sm) !important;
		}
		
		.wc-block-components-form .wc-block-components-text-input input:-webkit-autofill + label,
		.wc-block-components-form .wc-block-components-text-input.is-active label,
		.wc-block-components-text-input input:-webkit-autofill + label,
		.wc-block-components-text-input.is-active label,
		.wc-blocks-components-select label.wc-blocks-components-select__label {
			top: 2px;
			left: 22px;
		}
		
		button[type="submit"]:not(.cmplz-btn) {
			font-size: 18px !important;
			line-height: 1 !important;
			padding: 15px 20px !important;
			height: auto !important;
			color: var(--white);
			background-color: var(--light-violet) !important;
			border: 1px solid var(--light-violet) !important;
			border-radius: var(--radius-full) !important;
			box-shadow: var(--shadow-block) !important;
			
			&:hover, &:focus, &:active {
				color: var(--white);
				background-color: var(--mid-violet) !important;
				border-color: var(--mid-violet) !important;
			}
		}
	}
	
	[id="wpadminbar"] ~ .header {
		.navigation-main__primary {
			&.active {
				top: 180px;
			}
		}
	}
	
	/* Scroll animation*/
	.fade-up {
		opacity: 0;
		transform: translateY(30px);
		transition: opacity .6s ease 0.3s, transform .6s ease;
		
		&.visible {
			opacity: 1;
			transform: translateY(0);
		}
	}
	
	.header {
		position: relative;
		margin: 60px auto;
		padding: 0 60px;
		width: 100%;
		
		.header-wrapper {
			position: relative;
			display: flex;
			justify-content: space-between;
			align-items: center;
			z-index: 100;
			padding: 10px 40px;
			margin: 0 auto;
			max-width: var(--page-width);
			background: #DFDAF3;
			border: 1px solid var(--light-violet);
			border-radius: 50px;
			box-sizing: border-box;
		}
		
		.logo a {
			font-size: 22px;
			line-height: 1;
			color: var(--dark-violet);
			text-decoration: none;
			display: flex;
			align-items: center;
			gap: 15px;
		}
		
		.navigation-main__primary {
			.menu {
				display: flex;
				align-items: center;
				list-style: none;
				padding: 0;
				margin: 0;
				
				li {
					a {
						display: block;
						font-family: 'Funnel_SemiBold', sans-serif;
						font-size: 18px;
						line-height: 1;
						color: var(--dark-violet);
						text-decoration: none;
						padding: 9px 24px;
						border-radius: 50px;
						transition: all 0.5s ease;
						
						&:hover,
						&:focus,
						&:active {
							color: var(--light-violet);
						}
						
						&.active {
							color: var(--white);
							background-color: var(--light-violet);
						}
						
						&.cart-link {
							position: relative;
							border: 1px solid var(--light-violet);
							background-color: var(--white);
							margin-left: 20px;
							
							span {
								display: block;
								text-indent: -9999px;
							}
							
							&:before {
								content: '';
								display: block;
								position: absolute;
								top: 50%;
								left: 50%;
								transform: translate(-50%, -50%);
								z-index: 1;
								width: 24px;
								height: 24px;
								background-image: url('https://uni-luma.com/wp-content/uploads/2026/04/cart-violet.svg');
								background-repeat: no-repeat;
								background-size: 100%;
								transition: all 0.5s ease;
							}
							
							&.active {
								border-color: var(--light-violet);
								background-color: var(--light-violet);
								
								&:before {
									background-image: url('https://uni-luma.com/wp-content/uploads/2026/04/cart-white.svg');
								}
							}
							
							&:hover,
							&:focus,
							&:active {
								border-color: var(--mid-violet);
								background-color: var(--mid-violet);
								
								&:before {
									background-image: url('https://uni-luma.com/wp-content/uploads/2026/04/cart-white.svg');
								}
							}
						}
					}
				}
			}
		}
	}
	
	.header,
	.custom-page,
	.footer {
		a {
			color: var(--dark-violet);
			text-decoration: none;
			transition: all 0.5s ease;
			
			&:hover {
				color: var(--mid-violet);
			}
		}
	}
	
	h1,
	h2 {
		font-family: var(--font-display);
		font-weight: var(--font-bold);
		color: var(--dark-violet);
	}
	
	.block-title {
		font-family: var(--font-display);
		font-weight: var(--font-bold);
		position: relative;
		text-align: center;
		color: var(--dark-violet);
		font-size: 50px;
		line-height: 54px;
		margin: 0 auto 80px;
		width: max-content;
		max-width: 100%;
		
		&:before {
			content: '';
			display: block;
			position: absolute;
			background-repeat: no-repeat;
			background-size: 100%;
		}
	}
	
	.container_button_cta {
		width: 100%;
		user-select: none;
		
		.button_cta, .button_secondary_cta {
			width: 50%;
			min-width: fit-content;
		}
		
		.button_cta {
			align-items: center;
			display: flex;
			flex-direction: row;
		}
		
		a.button {
			width: 100%;
			display: flex;
			flex-direction: row;
			font-size: 18px;
			line-height: 22px;
			box-sizing: border-box;
			
			&:hover,
			&:focus,
			&:active {
				.button-text {
					background-color: var(--mid-violet);
					border-color: var(--mid-violet);
				}
				
				.arrow-icon {
					rotate: -45deg;
					background-color: var(--yellow);
					background-image: url('https://uni-luma.com/wp-content/uploads/2026/04/arrow-black.svg');
				}
			}
		}
		
		.button-text {
			color: var(--white);
			width: calc(100% - 50px);
			background-color: var(--light-violet);
			border: 2px solid var(--light-violet);
			padding: 12px 24px;
			text-decoration: none;
			text-transform: uppercase;
			text-align: center;
			border-radius: 30px;
			transition: all 0.5s ease;
		}
		
		.arrow-icon {
			margin: 0;
			width: 50px;
			height: 50px;
			transition: all 0.5s ease;
			background-color: var(--light-violet);
			background-image: url('https://uni-luma.com/wp-content/uploads/2026/04/arrow-white.svg');
			background-size: 24px auto;
			background-repeat: no-repeat;
			background-position: center;
			border-radius: 50%;
		}
		
		.button_secondary_cta {
			a.button {
				.button-text {
					color: var(--mid-violet);
					width: 100%;
					border: 2px solid var(--mid-violet);
					background-color: var(--white);
				}
				
				&:hover,
				&:focus,
				&:active {
					.button-text {
						color: var(--white);
						background-color: var(--mid-violet);
					}
				}
			}
		}
		
		&.primary {
			a.button {
				.button-text {
					font-size: 24px;
					line-height: 28px;
					padding-top: 9px;
					padding-bottom: 9px;
				}
			}
		}
		
		&.full-width {
			.button_cta {
				width: 100%;
			}
		}
	}
	
	.custom-page {
		padding: 0 60px;
		overflow: hidden;
	}
	
	.page-content {
		padding-bottom: 100px;
	}
	
	.block-wrapper {
		max-width: var(--page-width);
		margin-left: auto;
		margin-right: auto;
		box-sizing: content-box;
	}
	
	video {
		display: block;
		width: 100%;
		height: auto;
		aspect-ratio: 16 / 9;
		object-fit: cover;
		background-color: var(--black);
		border-radius: 20px;
		overflow: hidden;
	}
	
	section {
		scroll-margin-top: 100px;
	}
	
	/* Cookies */
	#cmplz-manage-consent {
		.cmplz-manage-consent {
			font-size: 16px;
			line-height: 1;
			color: var(--mid-violet);
			left: 20px;
			right: auto;
			height: auto;
			padding: 5px 10px;
			box-shadow: 0 0 10px rgba(121, 101, 193, 1);
		}
	}
	
	#cmplz-cookiebanner-container {
		.cmplz-cookiebanner {
			background: var(--main-bg);
			box-shadow: var(--shadow-block-2);
			
			button {
				color: var(--mid-violet);
				border: 1px solid var(--light-violet) !important;
				border-radius: var(--radius-full) !important;
				box-shadow: var(--shadow-block);
				
				&.cmplz-accept {
					color: var(--white);
					background-color: var(--light-violet) !important;
				}
			}
		}
	}
	
	@media only screen and (min-width: 1280px) {
		.mobile {
			display: none;
		}
	}
	
	@media only screen and (max-width: 1280px) {
		.header {
			padding: 0 20px;
			
			&.active {
				.overlay-menu {
					opacity: 1;
					z-index: 5;
				}
				
				.hamburger-menu {
					.menu-icon {
						&.menu-open {
							opacity: 0;
						}
						
						&.menu-close {
							opacity: 1;
						}
					}
				}
			}
			
			.overlay-menu {
				position: fixed;
				z-index: -1;
				opacity: 0;
				top: 0;
				right: 0;
				width: 100%;
				min-width: 320px;
				height: 100%;
				background-color: var(--main-bg);
				transition: all 0.8s ease;
			}

			<img class="menu-icon menu-open" src="https://uni-luma.com/wp-content/uploads/2026/04/menu_open.svg"
			     alt="menu">
			<img class="menu-icon menu-close" src="https://uni-luma.com/wp-content/uploads/2026/04/menu_close.svg"
			     alt="menu">
		</div>
	</div>
</header>

<!--header script-->
<script>
	document.addEventListener('DOMContentLoaded', () => {
		
		// Smooth scroll + close mobile menu
		function navigation() {
			const body = document.body;
			const header = document.querySelector('header');
			const mobileIcon = header.querySelector('.hamburger-menu');
			const mobileMenu = header.querySelector('.navigation-main__primary');
			const overlay = document.querySelector('.overlay-menu');
			
			function closeMenu() {
				mobileMenu.classList.remove('active');
				header.classList.remove('active');
				body.classList.remove('active');
			}
			
			function toggleMenu() {
				mobileMenu.classList.toggle('active');
				header.classList.toggle('active');
				body.classList.toggle('active');
			}
			
			document.querySelectorAll('a[href^="#"]').forEach(anchor => {
				anchor.addEventListener('click', function (e) {
					const target = document.querySelector(this.getAttribute('href'));
					
					if (!target) return;
					
					e.preventDefault();
					
					target.scrollIntoView({
						behavior: 'smooth'
					});
					
					closeMenu();
				});
			});
			
			// Mobile icon
			mobileIcon.addEventListener('click', toggleMenu);
			
			// Overlay
			overlay.addEventListener('click', closeMenu);
		}
		
		navigation();
		
		// Active links
		function activeLink() {
			const links = document.querySelectorAll(".navigation-main__primary .nav_link");
			
			const currentPath = window.location.pathname;
			
			links.forEach(link => {
				const href = link.getAttribute("href");
				
				if (!href) return;
				
				// hash links → ignore active state (or handle separately if needed)
				if (href.includes("#")) return;
				
				const linkPath = new URL(link.href, window.location.origin).pathname;
				
				link.classList.toggle("active", linkPath === currentPath);
			});
		}
		
		activeLink();
		
		// Carousel
		function Carousel() {
			const track = document.getElementById('carousel-track');
			
			if (!track) return;
			
			const outer = track.parentElement;
			const cards = [...track.querySelectorAll('.review-card')];
			
			let current = 0;
			let isDragging = false;
			let startX = 0;
			
			function getVisible() {
				if (window.innerWidth <= 768) return 1;
				if (window.innerWidth <= 1024) return 2;
				return 3;
			}
			
			function getGap() {
				if (window.innerWidth <= 768) return 12;
				if (window.innerWidth <= 1024) return 16;
				return 20;
			}
			
			function getStep() {
				const cardWidth = cards[0].getBoundingClientRect().width;
				return cardWidth + getGap();
			}
			
			function getMax() {
				return Math.max(0, cards.length - getVisible());
			}
			
			function updateCarousel(animate = true) {
				track.style.transition = animate
						? "transform .4s cubic-bezier(.4,0,.2,1)"
						: "none";
				
				const step = getStep();
				track.style.transform = `translateX(-${current * step}px)`;
			}
			
			function next() {
				if (current < getMax()) {
					current++;
					updateCarousel();
				}
			}
			
			function prev() {
				if (current > 0) {
					current--;
					updateCarousel();
				}
			}
			
			// swipe
			function startDrag(e) {
				isDragging = true;
				startX = e.touches ? e.touches[0].clientX : e.clientX;
			}
			
			function onDrag(e) {
				if (!isDragging) return;
				
				const x = e.touches ? e.touches[0].clientX : e.clientX;
				const diff = startX - x;
				
				if (Math.abs(diff) > 50) {
					diff > 0 ? next() : prev();
					isDragging = false;
				}
			}
			
			function endDrag() {
				isDragging = false;
			}
			
			// events
			document.getElementById('next-btn').addEventListener('click', next);
			document.getElementById('prev-btn').addEventListener('click', prev);
			
			outer.addEventListener('mousedown', startDrag);
			outer.addEventListener('touchstart', startDrag);
			
			window.addEventListener('mousemove', onDrag);
			window.addEventListener('touchmove', onDrag);
			
			window.addEventListener('mouseup', endDrag);
			window.addEventListener('touchend', endDrag);
			
			// resize fix
			window.addEventListener('resize', () => {
				const max = getMax();
				if (current > max) current = max;
				updateCarousel(false);
			});
			
			// init
			updateCarousel(false);
		}
		
		Carousel();
		
		// FAQ
		function Faq() {
			document.querySelectorAll('.faq-item').forEach(item => {
				const q = item.querySelector('.faq-question');
				const a = item.querySelector('.faq-answer');
				
				a.style.height = '0px';
				
				q.addEventListener('click', () => {
					const open = item.classList.contains('open');
					
					document.querySelectorAll('.faq-item.open').forEach(i => {
						closeItem(i);
					});
					
					if (!open) openItem(item);
				});
				
				q.addEventListener('keydown', e => {
					if (e.key === 'Enter' || e.key === ' ') q.click();
				});
			});
			
			function openItem(item) {
				const a = item.querySelector('.faq-answer');
				item.classList.add('open');
				
				a.style.height = a.scrollHeight + 'px';
				
				a.addEventListener('transitionend', function handler() {
					a.style.height = 'auto';
					a.removeEventListener('transitionend', handler);
				});
			}
			
			function closeItem(item) {
				const a = item.querySelector('.faq-answer');
				
				a.style.height = a.scrollHeight + 'px';
				
				requestAnimationFrame(() => {
					a.style.height = '0px';
				});
				
				item.classList.remove('open');
			}
		}
		
		Faq();
		
		// Scroll fade-in
		function Scroll() {
			const observer = new IntersectionObserver(entries => {
				entries.forEach(e => {
					if (e.isIntersecting) {
						e.target.classList.add('visible');
						observer.unobserve(e.target);
					}
				});
			}, {threshold: 0.12});
			document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));
		}
		
		Scroll();
	});
</script>
